<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Структура расходов</title>

<script src="https://cdn.jsdelivr..js@4.4.1/dist/chart.umd.min.js

<style>
:root {
  --bg: #0b1220;
  --sidebar: #111827;
  --card: #1e293b;
  --card-dark: #0f172a;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --yellow: #fbbf24;
  --purple: #a855f7;
  --muted: #94a3b8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Segoe UI, Arial, sans-serif;
}

body {
  background: var(--bg);
  color: white;
}

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--sidebar);
  padding: 26px 22px;
  border-right: 1px solid rgba(255,255,255,0.06);
}

.logo {
  font-size: 28px;
  font-weight: 800;
  color: var(--green);
  margin-bottom: 34px;
}

.logo span {
  color: white;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.menu-item {
  background: #1e293b;
  padding: 16px;
  border-radius: 14px;
  font-weight: 600;
}

.main {
  padding: 28px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.title {
  font-size: 30px;
  font-weight: 800;
}

.subtitle {
  color: #9fb3d1;
  margin-top: 6px;
}

.actions {
  display: flex;
  gap: 10px;
}

.btn {
  border: none;
  border-radius: 12px;
  background: #1e293b;
  color: white;
  padding: 13px 18px;
  font-weight: 700;
}

.btn-primary {
  background: var(--blue);
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

.card {
  background: linear-gradient(145deg, #1e293b, #111827);
  border-radius: 22px;
  padding: 24px;
  box-shadow: 0 16px 36px rgba(0,0,0,0.25);
}

.card-label {
  color: #a9bdd8;
  font-size: 15px;
}

.card-value {
  font-size: 38px;
  font-weight: 900;
  margin-top: 12px;
}

.card-note {
  margin-top: 12px;
  color: #a9bdd8;
  font-size: 13px;
}

.green { color: var(--green); }
.red { color: var(--red); }
.blue { color: var(--blue); }
.yellow { color: var(--yellow); }
.purple { color: var(--purple); }

.grid-main {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 18px;
  margin-top: 22px;
}

.panel {
  background: #1e293b;
  border-radius: 22px;
  padding: 24px;
  box-shadow: 0 14px 30px rgba(0,0,0,0.2);
}

.panel-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 18px;
}

.chart-box {
  height: 340px;
  position: relative;
}

.grid-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 18px;
  margin-top: 22px;
}

.list-row {
  display: flex;
  justify-content: space-between;
  padding: 13px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.big-number {
  font-size: 40px;
  font-weight: 900;
  margin-top: 12px;
}

.progress {
  height: 20px;
  background: #334155;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 18px;
}

.progress-fill {
  height: 100%;
  width: 16%;
  background: linear-gradient(90deg, #22c55e, #84cc16);
}

@media (max-width: 1200px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .kpi-grid,
  .grid-main,
  .grid-bottom {
    grid-template-columns: 1fr;
  }

  .actions {
    flex-wrap: wrap;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">💰 <span>Finance</span></div>

    <div class="menu">
      <div class="menu-item">📊 Dashboard</div>
      <div class="menu-item">📈 Доходы</div>
      <div class="menu-item">💸 Расходы</div>
      <div class="menu-item">🎯 Финансовая цель</div>
      <div class="menu-item">₿ Крипта</div>
      <div class="menu-item">📈 Акции</div>
      <div class="menu-item">💼 Инвестиции</div>
      <div class="menu-item">⚙️ Настройки</div>
    </div>
  </aside>

  <main class="main">

    <div class="topbar">
      <div>
        <div class="title">Financial Dashboard</div>
        <div class="subtitle">Контроль доходов, расходов и инвестиций</div>
      </div>

      <div class="actions">
        <button class="btn">PLN</button>
        <button class="btn">EUR</button>
        <button class="btn">USD</button>
        <button class="btn btn-primary">Добавить</button>
      </div>
    </div>

    <section class="kpi-grid">

      <div class="card">
        <div class="card-label">Общий доход</div>
        <div class="card-value green">25 383</div>
        <div class="card-note">▲ +12.4% к прошлому месяцу</div>
      </div>

      <div class="card">
        <div class="card-label">Общие расходы</div>
        <div class="card-value red">9 337</div>
        <div class="card-note">▼ -2.7% к прошлому месяцу</div>
      </div>

      <div class="card">
        <div class="card-label">Баланс</div>
        <div class="card-value blue">16 046</div>
        <div class="card-note">Текущий остаток</div>
      </div>

      <div class="card">
        <div class="card-label">Накопления</div>
        <div class="card-value yellow">63%</div>
        <div class="card-note">От дохода</div>
      </div>

      <div class="card">
        <div class="card-label">Финансовая цель</div>
        <div class="card-value purple">16%</div>
        <div class="card-note">16 046 / 100 000</div>
      </div>

    </section>

    <section class="grid-main">

      <div class="panel">
        <div class="panel-title">📈 Динамика доходов и расходов</div>
        <div class="chart-box">
          <canvas id="incomeChart"></canvas>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">🍩 Структура расходов</div>
        <div class="chart-box">
          <canvas id="expenseChart"></canvas>
        </div>
      </div>

    </section>

    <section class="grid-bottom">

      <div class="panel">
        <div class="panel-title">💵 Доходы по источникам</div>

        <div class="list-row">
          <span>Зарплата</span>
          <span>9 195 PLN</span>
        </div>

        <div class="list-row">
          <span>Сбережения</span>
          <span>16 000 PLN</span>
        </div>

        <div class="list-row">
          <span>Инвестиции</span>
          <span>0 PLN</span>
        </div>

        <div class="list-row">
          <span>Крипта</span>
          <span>0 PLN</span>
        </div>

        <div class="list-row">
          <span>Акции</span>
          <span>0 PLN</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">🔥 TOP расходов</div>

        <div class="list-row">
          <span>Квартира</span>
          <span>3043 PLN</span>
        </div>

        <div class="list-row">
          <span>Подарки</span>
          <span>2050 PLN</span>
        </div>

        <div class="list-row">
          <span>Маме</span>
          <span>2000 PLN</span>
        </div>

        <div class="list-row">
          <span>Бедренка</span>
          <span>1270 PLN</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">🎯 Финансовая цель</div>

        <div class="big-number">100 000 PLN</div>

        <div class="progress">
          <div class="progress-fill"></div>
        </div>

        <div style="margin-top: 16px;">Накоплено: 16 046 PLN</div>
        <div style="margin-top: 8px; color: #94a3b8;">Осталось: 83 954 PLN</div>
      </div>

    </section>

    <section class="grid-bottom">

      <div class="panel">
        <div class="panel-title">📈 Инвестиции</div>

        <div class="list-row">
          <span>Акции</span>
          <span>0 PLN</span>
        </div>

        <div class="list-row">
          <span>Криптовалюта</span>
          <span>0 PLN</span>
        </div>

        <div class="list-row">
          <span>Портфель</span>
          <span>0 PLN</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">📊 Cash Flow</div>
        <div class="big-number green">+16 046</div>
        <div style="margin-top: 16px; color: #94a3b8;">Положительный денежный поток</div>
      </div>

      <div class="panel">
        <div class="panel-title">📅 Последние операции</div>

        <div class="list-row">
          <span>Квартира</span>
          <span>3043 PLN</span>
        </div>

        <div class="list-row">
          <span>Подарки</span>
          <span>2050 PLN</span>
        </div>

        <div class="list-row">
          <span>Маме</span>
          <span>2000 PLN</span>
        </div>
      </div>

    </section>

  </main>

</div>

<script>
window.addEventListener("load", function () {
  if (typeof Chart === "undefined") {
    console.error("Chart.js не загрузился");
    return;
  }

  const incomeCanvas = document.getElementById("incomeChart");
  const expenseCanvas = document.getElementById("expenseChart");

  new Chart(incomeCanvas, {
    type: "line",
    data: {
      labels: ["Янв", "Фев", "Мар", "Апр", "Май", "Июн"],
      datasets: [
        {
          label: "Доходы",
          data: [3000, 5000, 8000, 12000, 18000, 25383],
          borderColor: "#22c55e",
          backgroundColor: "rgba(34,197,94,0.18)",
          fill: true,
          tension: 0.4
        },
        {
          label: "Расходы",
          data: [1000, 2000, 3000, 5000, 7000, 9337],
          borderColor: "#ef4444",
          backgroundColor: "rgba(239,68,68,0.18)",
          fill: true,
          tension: 0.4
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: "#ffffff"
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: "#94a3b8"
          },
          grid: {
            color: "rgba(255,255,255,0.06)"
          }
        },
        y: {
          ticks: {
            color: "#94a3b8"
          },
          grid: {
            color: "rgba(255,255,255,0.06)"
          }
        }
      }
    }
  });

  new Chart(expenseCanvas, {
    type: "doughnut",
    data: {
      labels: ["Квартира", "Подарки", "Маме", "Бедренка", "Интернет", "Зал"],
      datasets: [
        {
          data: [3043, 2050, 2000, 1270, 50, 50],
          backgroundColor: [
            "#3b82f6",
            "#22c55e",
            "#f59e0b",
            "#a855f7",
            "#06b6d4",
            "#ef4444"
          ],
          borderWidth: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "bottom",
          labels: {
            color: "#ffffff"
          }
        }
      }
    }
  });
});
</script>

</body>
</html>
